              - "Tasks": year-8/generative-ai/tasks/lesson-2-tasks.md
              - "Knowledge checks": year-8/generative-ai/quizzes/lesson-2-quizzes.md
          - "Lesson 3 · Creative AI":
              - "Lesson introduction": year-8/generative-ai/lesson-3/lesson-3-intro.md
              - "How to generate an image in Canva": year-8/generative-ai/lesson-3/generate-image-canva.md
              - "Tasks": year-8/generative-ai/tasks/lesson-3-tasks.md
          - "Lesson 4 · Using Generative AI Responsibly":
              - "Tasks": year-8/generative-ai/tasks/lesson-4-tasks.md
